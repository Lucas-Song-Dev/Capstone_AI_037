name: API Tests

on:
  push:
    branches: [ main, master, fullstack, fullstack-ui-3js ]
    paths:
      - 'api/**'
      - 'core/**'
      - '.github/workflows/backend-test.yml'
  pull_request:
    branches: [ main, master, fullstack, fullstack-ui-3js ]
    paths:
      - 'api/**'
      - 'core/**'
  workflow_dispatch:

jobs:
  test-api:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install core package
      run: |
        cd core
        pip install -e .
        pip install -r requirements.txt
    
    - name: Install API dependencies
      run: |
        cd api
        pip install -r requirements.txt
        pip install pytest pytest-cov fastapi[all]
    
    - name: Run API tests
      run: |
        cd api
        pytest tests/ -v --cov=main --cov-report=term-missing
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: api-test-results
        path: api/tests/
        retention-days: 30
